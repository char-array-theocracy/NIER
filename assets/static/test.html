<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Query Interface</title>
    <script type="text/javascript">
        function sendQuery() {
            var query = document.getElementById("query").value;
            fetch('site/relay.fcgi?query=' + encodeURIComponent(query))
                .then(response => response.text())
                .then(data => {
                    document.getElementById("result").value = data;
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById("result").value = 'An error occurred while fetching the result.';
                });
        }
    </script>
</head>
<body>
    <h1>Query Interface</h1>
    <label for="query">Enter your query:</label><br>
    <textarea id="query" rows="10" cols="80" placeholder="Type your query here"></textarea><br><br>
    <button onclick="sendQuery()">Submit Query</button><br><br>
    <label for="result">Result:</label><br>
    <textarea id="result" rows="10" cols="80" placeholder="The result will appear here"></textarea>
</body>
</html>
